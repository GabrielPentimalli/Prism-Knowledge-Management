<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRISM | Ricerca</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header class="topbar">
    <div class="brand"><a href="/home">PRISM</a></div>
    <nav>
        <a href="/home">Home</a>
        <a href="/search/global">Ricerca</a>
        <a href="/settings">Impostazioni</a>
    </nav>
    <div class="local-mode-indicator" title="Modalità locale attiva"></div>
</header>
<main class="page" style="max-width: 1080px;">
    <section class="panel">
        <div class="panel-header">
            <h1>Ricerca</h1>
        </div>
        <div class="panel-body">
            <form id="global-search-form">
                <div class="row-inline">
                    <input id="query" type="text" placeholder="Cerca nei documenti indicizzati..." required autofocus>
                    <button type="submit">Cerca</button>
                </div>

                <details class="collapsible" style="margin: 14px -20px -16px -20px;">
                    <summary>
                        <span class="chevron"></span>
                        <span class="title">Filtri</span>
                    </summary>
                    <div class="collapsible-body">
                        <div class="filter-grid">
                            <div>
                                <label for="fileType">Tipo file</label>
                                <select id="fileType">
                                    <option value="">Tutti</option>
                                    <option value="PDF">PDF</option>
                                    <option value="HTML">HTML</option>
                                </select>
                            </div>
                            <div>
                                <label for="vaultId">Vault</label>
                                <select id="vaultId">
                                    <option value="">Tutti</option>
                                    <option th:each="vault : ${vaults}" th:value="${vault.id}" th:text="${vault.name}"></option>
                                </select>
                            </div>
                            <div>
                                <label for="addedAfter">Dopo</label>
                                <input id="addedAfter" type="date">
                            </div>
                            <div>
                                <label for="addedBefore">Prima</label>
                                <input id="addedBefore" type="date">
                            </div>
                        </div>
                    </div>
                </details>
            </form>
        </div>
    </section>

    <section class="panel" id="results-panel" style="display:none;">
        <div class="panel-header">
            <h2 id="results-title">Risultati</h2>
            <span class="muted" id="results-meta">—</span>
        </div>
        <div class="panel-body" id="global-results"></div>
    </section>
</main>
<footer th:replace="~{fragments/footer :: footer}"></footer>
<script th:src="@{/js/ui.js}"></script>
<script>
const escapeHtml = (v) => String(v ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

const groupByDocument = (hits) => {
    const map = new Map();
    hits.forEach((h) => {
        if (!map.has(h.docId)) {
            map.set(h.docId, {
                docId: h.docId,
                docName: h.docName,
                fileType: h.fileType,
                vaultId: h.vaultId,
                hits: [],
            });
        }
        map.get(h.docId).hits.push(h);
    });
    return Array.from(map.values()).sort((a, b) => b.hits.length - a.hits.length);
};

document.getElementById('global-search-form').addEventListener('submit', async (event) => {
    event.preventDefault();
    const query = document.getElementById('query').value.trim();
    if (!query) return;

    const params = new URLSearchParams();
    params.set('q', query);
    ['fileType', 'vaultId', 'addedAfter', 'addedBefore'].forEach(id => {
        const value = document.getElementById(id).value;
        if (value) params.set(id, value);
    });

    const panel = document.getElementById('results-panel');
    const root = document.getElementById('global-results');
    const meta = document.getElementById('results-meta');
    panel.style.display = '';
    root.innerHTML = '<p class="muted">Ricerca locale in corso...</p>';
    meta.textContent = '—';

    try {
        const res = await fetch(`/api/search/global?${params.toString()}`);
        const data = await res.json();
        const grouped = groupByDocument(data.hits || []);
        meta.textContent = `${grouped.length} document${grouped.length === 1 ? 'o' : 'i'} · ${data.total || 0} occorrenze`;
        root.innerHTML = '';
        if (grouped.length === 0) {
            root.innerHTML = '<p class="muted">Nessun risultato trovato.</p>';
            return;
        }
        grouped.forEach(group => {
            const card = document.createElement('div');
            card.className = 'doc-result-card';
            const best = group.hits[0];
            card.innerHTML = `
                <a class="doc-result-main" href="/document/${encodeURIComponent(group.docId)}" target="_blank" rel="noopener">
                    <div class="doc-result-head">
                        <strong>${escapeHtml(group.docName)}</strong>
                        <span class="badge badge-muted">${escapeHtml(group.fileType)}</span>
                        <span class="badge badge-success">${group.hits.length} occorrenz${group.hits.length === 1 ? 'a' : 'e'}</span>
                    </div>
                    <div class="doc-result-snippet">${escapeHtml(best.snippet)}</div>
                </a>
                <details class="doc-result-more">
                    <summary>Mostra tutte le occorrenze</summary>
                    <div class="doc-result-hits"></div>
                </details>
            `;
            const hitsHost = card.querySelector('.doc-result-hits');
            group.hits.forEach((h) => {
                const item = document.createElement('a');
                item.className = 'doc-result-hit';
                item.target = '_blank';
                item.rel = 'noopener';
                item.href = `/document/${encodeURIComponent(h.docId)}#page-${encodeURIComponent(h.page)}`;
                item.innerHTML = `
                    <div class="meta">Pagina <strong>${escapeHtml(h.page)}</strong></div>
                    <div>${escapeHtml(h.snippet)}</div>
                `;
                hitsHost.appendChild(item);
            });
            root.appendChild(card);
        });
    } catch (e) {
        root.innerHTML = `<p class="error-text">Errore ricerca: ${escapeHtml(e.message)}</p>`;
    }
});
</script>
</body>
</html>
