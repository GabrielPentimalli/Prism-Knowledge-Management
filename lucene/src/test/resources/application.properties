# Test properties - override defaults to keep everything local and isolated
llm.base-url=http://localhost:9999
llm.model=test-model

prism.storage.default-data-root=target/prism-test-data
prism.storage.bootstrap-file=target/prism-test-data/bootstrap.json
prism.local-mode.required=true
prism.onboarding.required=false
prism.minimum-free-disk-mb=1

prism.lucene.chunk-index-dir=indices/chunks
prism.chunk.size=900
prism.chunk.overlap=150
prism.retrieval.top-k=8

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB
