<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRISM | Impostazioni</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header class="topbar">
    <div class="brand"><a href="/home">PRISM</a></div>
    <nav>
        <a href="/home" title="Home" aria-label="Home">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12l9-9 9 9"/><path d="M5 10v10h14V10"/><path d="M10 20v-6h4v6"/></svg>
        </a>
        <a href="/search/global" title="Ricerca" aria-label="Ricerca">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
        </a>
        <a href="/settings" title="Impostazioni" aria-label="Impostazioni">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.8l.1.1a2 2 0 0 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.8-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 0 1-4 0v-.1a1.7 1.7 0 0 0-1-1.5 1.7 1.7 0 0 0-1.8.3l-.1.1a2 2 0 0 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.8 1.7 1.7 0 0 0-1.5-1H3a2 2 0 0 1 0-4h.1a1.7 1.7 0 0 0 1.5-1 1.7 1.7 0 0 0-.3-1.8l-.1-.1a2 2 0 0 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.8.3h.1a1.7 1.7 0 0 0 1-1.5V3a2 2 0 0 1 4 0v.1a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.8-.3l.1-.1a2 2 0 0 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.8v.1a1.7 1.7 0 0 0 1.5 1H21a2 2 0 0 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1z"/></svg>
        </a>
    </nav>
</header>
<main class="page" style="max-width: 880px;">
    <section class="panel">
        <div class="panel-header">
            <h1>Impostazioni locali</h1>
        </div>
        <div class="panel-body">
            <form id="settings-form">
                <label>Cartella dati</label>
                <input id="dataRoot" type="text" th:value="${settings.dataRoot}">

                <label>Modello AI locale</label>
                <input id="llmModel" type="text" th:value="${settings.llmModel}">

                <label>Endpoint AI locale</label>
                <input id="llmBaseUrl" type="text" th:value="${settings.llmBaseUrl}">

                <button type="submit" style="margin-top: 18px;" title="Salva impostazioni" aria-label="Salva impostazioni">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
                </button>
            </form>
            <div id="settings-feedback" class="muted" style="margin-top: 12px;"></div>
        </div>
    </section>

    <details class="panel collapsible" open>
        <summary>
            <span class="chevron"></span>
            <span class="title">Privacy</span>
        </summary>
        <div class="collapsible-body">
            <p>Nessun contenuto viene inviato in rete. Sono consentite solo chiamate all'LLM locale su localhost.</p>
            <button id="delete-total-btn" class="danger" style="margin-top: 8px;" title="Cancella tutti i dati locali" aria-label="Cancella tutti i dati locali">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-2 14a2 2 0 0 1-2 2H9a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v2"/></svg>
                <span>ELIMINA TUTTI I DATI</span>
            </button>
        </div>
    </details>

    <details class="panel collapsible">
        <summary>
            <span class="chevron"></span>
            <span class="title">Log operazioni locali</span>
            <span class="meta" id="log-meta">—</span>
        </summary>
        <div class="collapsible-body">
            <pre id="privacy-log"></pre>
        </div>
    </details>
</main>
<script th:src="@{/js/ui.js}"></script>
<script>
const t = (key, params = {}, fallback = key) => window.PrismI18n?.t(key, params, fallback) || fallback;

async function refreshSettingsData() {
    const res = await fetch('/api/settings');
    const data = await res.json();
    const lines = data.privacyLog || [];
    document.getElementById('privacy-log').textContent = lines.length > 0 ? lines.join('\n') : t('settings.noEvents', {}, '(nessun evento registrato)');
    document.getElementById('log-meta').textContent = t('settings.rowsCount', {count: lines.length}, `${lines.length} righe`);
}

document.getElementById('settings-form').addEventListener('submit', async (event) => {
    event.preventDefault();
    const payload = {
        dataRoot: document.getElementById('dataRoot').value,
        llmModel: document.getElementById('llmModel').value,
        llmBaseUrl: document.getElementById('llmBaseUrl').value
    };
    const progress = window.PrismToast?.progress(t('settings.saving', {}, 'Salvataggio impostazioni...'));
    try {
        const res = await fetch('/api/settings', {
            method: 'PUT',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload)
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
        progress?.update(t('settings.saved', {}, 'Impostazioni salvate (LLM riconfigurato a caldo).'), 'success');
        await refreshSettingsData();
    } catch (e) {
        progress?.update(`${t('common.errorPrefix', {}, 'Errore')}: ${e.message}`, 'error');
        setTimeout(() => progress?.close(), 5000);
    }
});

document.getElementById('delete-total-btn').addEventListener('click', async () => {
    if (!confirm(t('settings.deleteAllConfirm', {}, 'Sei sicuro di voler cancellare tutti i dati locali? L\'azione è irreversibile.'))) return;
    const progress = window.PrismToast?.progress(t('settings.deletingAll', {}, 'Cancellazione di tutti i dati locali...'));
    try {
        await fetch('/api/data/delete', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({mode: 'TOTAL'})
        });
        progress?.update(t('settings.deletedRedirect', {}, 'Dati cancellati. Reindirizzamento all\'onboarding...'), 'success');
        setTimeout(() => { window.location.href = '/onboarding'; }, 1200);
    } catch (e) {
        progress?.update(`${t('common.errorPrefix', {}, 'Errore')}: ${e.message}`, 'error');
    }
});

refreshSettingsData();
</script>
<footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
