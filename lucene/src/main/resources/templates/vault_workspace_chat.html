<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRISM | Chat Vault</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/chat.css}">
</head>
<body data-scope-type="VAULT" th:attr="data-scope-id=${vaultId}">
<header class="topbar">
    <div class="brand"><a href="/home">PRISM</a></div>
    <nav>
        <a href="/home" title="Home" aria-label="Home">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12l9-9 9 9"/><path d="M5 10v10h14V10"/><path d="M10 20v-6h4v6"/></svg>
        </a>
        <a href="/search/global" title="Ricerca" aria-label="Ricerca">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
        </a>
        <a href="/settings" title="Impostazioni" aria-label="Impostazioni">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.8l.1.1a2 2 0 0 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.8-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 0 1-4 0v-.1a1.7 1.7 0 0 0-1-1.5 1.7 1.7 0 0 0-1.8.3l-.1.1a2 2 0 0 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.8 1.7 1.7 0 0 0-1.5-1H3a2 2 0 0 1 0-4h.1a1.7 1.7 0 0 0 1.5-1 1.7 1.7 0 0 0-.3-1.8l-.1-.1a2 2 0 0 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.8.3h.1a1.7 1.7 0 0 0 1-1.5V3a2 2 0 0 1 4 0v.1a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.8-.3l.1-.1a2 2 0 0 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.8v.1a1.7 1.7 0 0 0 1.5 1H21a2 2 0 0 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1z"/></svg>
        </a>
    </nav>
</header>
<main class="page" style="max-width: 1080px;">
    <nav class="workspace-nav" aria-label="Sezioni vault">
        <a class="workspace-nav-link" th:href="@{/workspace/vault/documents(vaultId=${vaultId})}">Documenti</a>
        <a class="workspace-nav-link active" th:href="@{/workspace/vault/chat(vaultId=${vaultId})}">Chat</a>
    </nav>

    <section class="panel">
        <div class="panel-header">
            <h1 id="vault-title">Vault</h1>
            <div style="display:flex;gap:8px;">
                <a class="cta cta-small ghost" th:href="@{/workspace/vault/documents(vaultId=${vaultId})}">Gestisci documenti</a>
                <a class="cta cta-small ghost" href="/home">Torna ai vault</a>
            </div>
        </div>
        <div class="panel-body" th:if="${vaultId == null || #strings.isEmpty(vaultId)}">
            <p class="muted">Seleziona un vault dalla home per iniziare la chat.</p>
        </div>
    </section>

    <article class="panel chat-panel" th:if="${vaultId != null && !#strings.isEmpty(vaultId)}">
        <div class="panel-header">
            <h2>Chat vault</h2>
            <div style="display:flex;gap:6px;">
                <button id="new-chat-btn" class="icon" title="Nuova sessione" aria-label="Nuova sessione">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                </button>
                <button class="icon" data-toggle="chat-body-wrap" title="Comprimi/Espandi" aria-label="Comprimi/Espandi">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/></svg>
                </button>
            </div>
        </div>
        <div class="chat-body" id="chat-body-wrap">
            <details class="collapsible" style="margin: -16px -20px 12px -20px; border-top: none;">
                <summary>
                    <span class="chevron"></span>
                    <span class="title">Cronologia sessioni</span>
                    <span class="meta" id="session-meta">—</span>
                </summary>
                <div class="collapsible-body">
                    <div id="session-list" class="session-list"></div>
                </div>
            </details>
            <div id="chat-window"></div>
            <div id="input-area">
                <input type="text" id="user-input" placeholder="Fai una domanda trasversale sul vault...">
                <button id="send-btn" title="Invia" aria-label="Invia">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                </button>
            </div>
            <div id="citation-links"></div>
        </div>
    </article>
</main>
<footer th:replace="~{fragments/footer :: footer}"></footer>
<script th:src="@{/js/ui.js}"></script>
<script th:src="@{/js/chat.js}"></script>
</body>
</html>
