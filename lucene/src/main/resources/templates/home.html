<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRISM | Home</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header class="topbar">
    <div class="brand"><a href="/home">PRISM</a></div>
    <nav>
        <a href="/home" title="Home" aria-label="Home">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12l9-9 9 9"/><path d="M5 10v10h14V10"/><path d="M10 20v-6h4v6"/></svg>
        </a>
        <a href="/search/global" title="Ricerca" aria-label="Ricerca">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
        </a>
        <a href="/settings" title="Impostazioni" aria-label="Impostazioni">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.8l.1.1a2 2 0 0 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.8-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 0 1-4 0v-.1a1.7 1.7 0 0 0-1-1.5 1.7 1.7 0 0 0-1.8.3l-.1.1a2 2 0 0 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.8 1.7 1.7 0 0 0-1.5-1H3a2 2 0 0 1 0-4h.1a1.7 1.7 0 0 0 1.5-1 1.7 1.7 0 0 0-.3-1.8l-.1-.1a2 2 0 0 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.8.3h.1a1.7 1.7 0 0 0 1-1.5V3a2 2 0 0 1 4 0v.1a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.8-.3l.1-.1a2 2 0 0 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.8v.1a1.7 1.7 0 0 0 1.5 1H21a2 2 0 0 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1z"/></svg>
        </a>
    </nav>
</header>
<main class="page">
    <section class="panel" id="vaults-section">
        <div class="panel-header">
            <h2>Vault</h2>
            <span class="muted" th:text="${#lists.size(vaults)} + ' totali'">0 totali</span>
        </div>
        <div class="panel-body">
            <form id="create-vault-form" class="row-inline" style="margin-bottom: 14px;">
                <input id="vault-name" type="text" placeholder="Nome del nuovo vault" required>
                <button type="submit" title="Crea vault" aria-label="Crea vault">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                </button>
            </form>
            <div id="vault-list" data-page-size="5">
                <div th:if="${#lists.isEmpty(vaults)}" class="muted">Nessun vault. Creane uno per iniziare.</div>
                <div th:each="vault : ${vaults}" class="result-card vault-item" th:data-vault-id="${vault.id}">
                    <div style="flex: 1;">
                        <strong th:text="${vault.name}">Vault</strong>
                        <div class="meta">
                            <span th:text="${#lists.size(vault.docIds)} + ' documenti'">0 documenti</span>
                        </div>
                    </div>
                    <div style="display:flex;gap:6px;">
                        <a class="cta cta-small" th:href="@{/workspace/vault/documents(vaultId=${vault.id})}">Apri</a>
                        <button class="danger delete-vault-btn" th:data-vault-id="${vault.id}" th:data-vault-name="${vault.name}" title="Elimina vault" aria-label="Elimina vault">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-2 14a2 2 0 0 1-2 2H9a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v2"/></svg>
                        </button>
                    </div>
                </div>
            </div>
            <nav class="pagination" id="vault-pagination"></nav>
        </div>
    </section>

    <details class="panel collapsible">
        <summary>
            <span class="chevron"></span>
            <span class="title">Documenti recenti</span>
            <span class="meta" th:text="${#lists.size(recentDocuments)} + ' totali'">0 totali</span>
        </summary>
        <div class="collapsible-body">
            <div id="doc-list" data-page-size="5">
                <div th:if="${#lists.isEmpty(recentDocuments)}" class="muted">Nessun documento caricato.</div>
                <div th:each="doc : ${recentDocuments}" class="result-card doc-item">
                    <div style="flex: 1;">
                        <strong th:text="${doc.name}">Documento</strong>
                        <div class="meta" th:text="${doc.type}">PDF</div>
                    </div>
                    <a class="cta cta-small" th:href="@{'/document/' + ${doc.id}}" target="_blank">Apri</a>
                </div>
            </div>
            <nav class="pagination" id="doc-pagination"></nav>
        </div>
    </details>
</main>
<footer th:replace="~{fragments/footer :: footer}"></footer>
<script th:src="@{/js/ui.js}"></script>
<script>
const t = (key, params = {}, fallback = key) => window.PrismI18n?.t(key, params, fallback) || fallback;

document.getElementById('create-vault-form').addEventListener('submit', async (event) => {
    event.preventDefault();
    const input = document.getElementById('vault-name');
    const name = input.value.trim();
    if (!name) return;
    const progress = window.PrismToast?.progress(t('home.creatingVault', {}, 'Creazione vault...'));
    try {
        const res = await fetch('/api/vaults', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({name})
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
        progress?.update(t('home.vaultCreated', {name}, `Vault "${name}" creato`), 'success');
        setTimeout(() => { window.location.href = `/workspace/vault/documents?vaultId=${encodeURIComponent(data.id)}`; }, 600);
    } catch (e) {
        progress?.update(`${t('common.errorPrefix', {}, 'Errore')}: ${e.message}`, 'error');
        setTimeout(() => progress?.close(), 4000);
    }
});

// ─── Vault pagination ──────────────────────────────────────────
(() => {
    const listEl = document.getElementById('vault-list');
    const navEl = document.getElementById('vault-pagination');
    if (!listEl || !navEl) return;
    const pageSize = parseInt(listEl.dataset.pageSize || '5', 10);
    const items = Array.from(listEl.querySelectorAll('.vault-item'));
    if (items.length === 0) { navEl.style.display = 'none'; return; }
    const totalPages = Math.max(1, Math.ceil(items.length / pageSize));
    let current = 1;

    const showPage = (p) => {
        current = Math.max(1, Math.min(totalPages, p));
        items.forEach((el, i) => {
            el.style.display = (Math.floor(i / pageSize) === current - 1) ? '' : 'none';
        });
        renderNav();
    };

    const renderNav = () => {
        navEl.innerHTML = '';
        if (totalPages <= 1) { navEl.style.display = 'none'; return; }
        navEl.style.display = '';
        const ICON_PREV = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>';
        const ICON_NEXT = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>';
        const mkBtn = (content, page, opts = {}) => {
            const b = document.createElement('button');
            b.type = 'button';
            if (opts.html) {
                b.innerHTML = content;
                b.title = opts.title || '';
                b.setAttribute('aria-label', opts.title || '');
            } else {
                b.textContent = content;
            }
            b.className = opts.active ? 'page-btn active' : 'page-btn';
            if (opts.disabled) b.disabled = true;
            b.addEventListener('click', () => showPage(page));
            return b;
        };
        navEl.appendChild(mkBtn(ICON_PREV, current - 1, { disabled: current === 1, html: true, title: t('common.previous', {}, 'Precedente') }));
        for (let i = 1; i <= totalPages; i++) {
            navEl.appendChild(mkBtn(String(i), i, { active: i === current }));
        }
        navEl.appendChild(mkBtn(ICON_NEXT, current + 1, { disabled: current === totalPages, html: true, title: t('common.next', {}, 'Successiva') }));
    };

    showPage(1);
})();

// ─── Document pagination ───────────────────────────────────────
(() => {
    const listEl = document.getElementById('doc-list');
    const navEl = document.getElementById('doc-pagination');
    if (!listEl || !navEl) return;
    const pageSize = parseInt(listEl.dataset.pageSize || '5', 10);
    const items = Array.from(listEl.querySelectorAll('.doc-item'));
    if (items.length === 0) { navEl.style.display = 'none'; return; }
    const totalPages = Math.max(1, Math.ceil(items.length / pageSize));
    let current = 1;

    const showPage = (p) => {
        current = Math.max(1, Math.min(totalPages, p));
        items.forEach((el, i) => {
            el.style.display = (Math.floor(i / pageSize) === current - 1) ? '' : 'none';
        });
        renderNav();
    };

    const renderNav = () => {
        navEl.innerHTML = '';
        if (totalPages <= 1) { navEl.style.display = 'none'; return; }
        navEl.style.display = '';
        const ICON_PREV = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>';
        const ICON_NEXT = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>';
        const mkBtn = (content, page, opts = {}) => {
            const b = document.createElement('button');
            b.type = 'button';
            if (opts.html) {
                b.innerHTML = content;
                b.title = opts.title || '';
                b.setAttribute('aria-label', opts.title || '');
            } else {
                b.textContent = content;
            }
            b.className = opts.active ? 'page-btn active' : 'page-btn';
            if (opts.disabled) b.disabled = true;
            b.addEventListener('click', () => showPage(page));
            return b;
        };
        navEl.appendChild(mkBtn(ICON_PREV, current - 1, { disabled: current === 1, html: true, title: t('common.previous', {}, 'Precedente') }));
        for (let i = 1; i <= totalPages; i++) {
            navEl.appendChild(mkBtn(String(i), i, { active: i === current }));
        }
        navEl.appendChild(mkBtn(ICON_NEXT, current + 1, { disabled: current === totalPages, html: true, title: t('common.next', {}, 'Successiva') }));
    };

    showPage(1);
})();

document.querySelectorAll('.delete-vault-btn').forEach((btn) => {
    btn.addEventListener('click', async () => {
        const id = btn.dataset.vaultId;
        const name = btn.dataset.vaultName;
        if (!confirm(t('home.deleteVaultConfirm', {name}, `Eliminare il vault "${name}"? I documenti restano disponibili.`))) return;
        const progress = window.PrismToast?.progress(t('home.deletingVault', {name}, `Eliminazione "${name}"...`));
        try {
            const res = await fetch(`/api/vaults/${encodeURIComponent(id)}`, {method: 'DELETE'});
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            progress?.update(t('home.vaultDeleted', {name}, `Vault "${name}" eliminato`), 'success');
            setTimeout(() => window.location.reload(), 700);
        } catch (e) {
            progress?.update(`${t('common.errorPrefix', {}, 'Errore')}: ${e.message}`, 'error');
            setTimeout(() => progress?.close(), 4000);
        }
    });
});
</script>
</body>
</html>
