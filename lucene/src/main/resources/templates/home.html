<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRISM | Home</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header class="topbar">
    <div class="brand"><a href="/home">PRISM</a></div>
    <nav>
        <a href="/home">Home</a>
        <a href="/search/global">Ricerca</a>
        <a href="/settings">Impostazioni</a>
    </nav>
    <div class="local-mode-indicator" title="Modalità locale attiva"></div>
</header>
<main class="page">
    <section class="panel" id="vaults-section">
        <div class="panel-header">
            <h2>Vault</h2>
            <span class="muted" th:text="${#lists.size(vaults)} + ' totali'">0 totali</span>
        </div>
        <div class="panel-body">
            <form id="create-vault-form" class="row-inline" style="margin-bottom: 14px;">
                <input id="vault-name" type="text" placeholder="Nome del nuovo vault" required>
                <button type="submit">Crea vault</button>
            </form>
            <div id="vault-list" data-page-size="5">
                <div th:if="${#lists.isEmpty(vaults)}" class="muted">Nessun vault. Creane uno per iniziare.</div>
                <div th:each="vault : ${vaults}" class="result-card vault-item" th:data-vault-id="${vault.id}">
                    <div style="flex: 1;">
                        <strong th:text="${vault.name}">Vault</strong>
                        <div class="meta">
                            <span th:text="${#lists.size(vault.docIds)} + ' documenti'">0 documenti</span>
                        </div>
                    </div>
                    <div style="display:flex;gap:6px;">
                        <a class="cta cta-small" th:href="@{'/workspace/vault?vaultId=' + ${vault.id}}">Apri</a>
                        <button class="danger delete-vault-btn" th:data-vault-id="${vault.id}" th:data-vault-name="${vault.name}">Elimina</button>
                    </div>
                </div>
            </div>
            <nav class="pagination" id="vault-pagination"></nav>
        </div>
    </section>

    <details class="panel collapsible">
        <summary>
            <span class="chevron"></span>
            <span class="title">Documenti recenti</span>
            <span class="meta" th:text="${#lists.size(recentDocuments)} + ' totali'">0 totali</span>
        </summary>
        <div class="collapsible-body">
            <div th:if="${#lists.isEmpty(recentDocuments)}" class="muted">Nessun documento caricato.</div>
            <div th:each="doc : ${recentDocuments}" class="result-card">
                <div style="flex: 1;">
                    <strong th:text="${doc.name}">Documento</strong>
                    <div class="meta" th:text="${doc.type}">PDF</div>
                </div>
                <a class="cta cta-small" th:href="@{'/document/' + ${doc.id}}" target="_blank">Apri</a>
            </div>
        </div>
    </details>
</main>
<footer th:replace="~{fragments/footer :: footer}"></footer>
<script th:src="@{/js/ui.js}"></script>
<script>
document.getElementById('create-vault-form').addEventListener('submit', async (event) => {
    event.preventDefault();
    const input = document.getElementById('vault-name');
    const name = input.value.trim();
    if (!name) return;
    const progress = window.PrismToast?.progress('Creazione vault...');
    try {
        const res = await fetch('/api/vaults', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({name})
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
        progress?.update(`Vault "${name}" creato`, 'success');
        setTimeout(() => { window.location.href = `/workspace/vault?vaultId=${encodeURIComponent(data.id)}`; }, 600);
    } catch (e) {
        progress?.update(`Errore: ${e.message}`, 'error');
        setTimeout(() => progress?.close(), 4000);
    }
});

// ─── Vault pagination ──────────────────────────────────────────
(() => {
    const listEl = document.getElementById('vault-list');
    const navEl = document.getElementById('vault-pagination');
    if (!listEl || !navEl) return;
    const pageSize = parseInt(listEl.dataset.pageSize || '5', 10);
    const items = Array.from(listEl.querySelectorAll('.vault-item'));
    if (items.length === 0) { navEl.style.display = 'none'; return; }
    const totalPages = Math.max(1, Math.ceil(items.length / pageSize));
    let current = 1;

    const showPage = (p) => {
        current = Math.max(1, Math.min(totalPages, p));
        items.forEach((el, i) => {
            el.style.display = (Math.floor(i / pageSize) === current - 1) ? '' : 'none';
        });
        renderNav();
    };

    const renderNav = () => {
        navEl.innerHTML = '';
        if (totalPages <= 1) { navEl.style.display = 'none'; return; }
        navEl.style.display = '';
        const mkBtn = (label, page, opts = {}) => {
            const b = document.createElement('button');
            b.type = 'button';
            b.textContent = label;
            b.className = opts.active ? 'page-btn active' : 'page-btn';
            if (opts.disabled) b.disabled = true;
            b.addEventListener('click', () => showPage(page));
            return b;
        };
        navEl.appendChild(mkBtn('Precedente', current - 1, { disabled: current === 1 }));
        for (let i = 1; i <= totalPages; i++) {
            navEl.appendChild(mkBtn(String(i), i, { active: i === current }));
        }
        navEl.appendChild(mkBtn('Successiva', current + 1, { disabled: current === totalPages }));
    };

    showPage(1);
})();

document.querySelectorAll('.delete-vault-btn').forEach((btn) => {
    btn.addEventListener('click', async () => {
        const id = btn.dataset.vaultId;
        const name = btn.dataset.vaultName;
        if (!confirm(`Eliminare il vault "${name}"? I documenti restano disponibili.`)) return;
        const progress = window.PrismToast?.progress(`Eliminazione "${name}"...`);
        try {
            const res = await fetch(`/api/vaults/${encodeURIComponent(id)}`, {method: 'DELETE'});
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            progress?.update(`Vault "${name}" eliminato`, 'success');
            setTimeout(() => window.location.reload(), 700);
        } catch (e) {
            progress?.update(`Errore: ${e.message}`, 'error');
            setTimeout(() => progress?.close(), 4000);
        }
    });
});
</script>
</body>
</html>
