<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRISM</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header class="topbar">
    <div class="brand">PRISM</div>
</header>
<main class="page" style="max-width: 720px;">
    <section class="panel">
        <div class="panel-header">
            <h1>Benvenuto in PRISM</h1>
        </div>
        <div class="panel-body">
            <p>PRISM è un knowledge manager <strong>local-first</strong>: i tuoi documenti e le tue chat restano sempre sul tuo dispositivo.</p>
            <form id="onboarding-form">
                <label for="dataRoot">Path locale</label>
                <input id="dataRoot" name="dataRoot" type="text" placeholder="/Users/you/PRISM-data" required>

                <label for="llmModel">Modello LLM locale</label>
                <input id="llmModel" name="llmModel" type="text" value="llama3.1:8b" required>

                <label for="llmBaseUrl">Endpoint LLM locale</label>
                <input id="llmBaseUrl" name="llmBaseUrl" type="text" value="http://localhost:11434/v1" required>

                <button type="submit" style="margin-top: 18px; width: 100%;" title="Inizializza PRISM locale" aria-label="Inizializza PRISM locale">CONFERMA</button>
            </form>
            <div id="onboarding-error" class="error-text" style="margin-top: 12px;"></div>
        </div>
    </section>
</main>
<script th:src="@{/js/ui.js}"></script>
<script>
const t = (key, params = {}, fallback = key) => window.PrismI18n?.t(key, params, fallback) || fallback;

async function loadStatus() {
    const res = await fetch('/api/system/status');
    const status = await res.json();
    document.getElementById('dataRoot').value = status.dataRoot || '';
}

document.getElementById('onboarding-form').addEventListener('submit', async (event) => {
    event.preventDefault();
    const payload = Object.fromEntries(new FormData(event.target).entries());
    const res = await fetch('/api/onboarding/init', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(payload)
    });
    if (!res.ok) {
        const data = await res.json();
        document.getElementById('onboarding-error').textContent = data.error || t('onboarding.error', {}, 'Errore onboarding');
        return;
    }
    window.location.href = '/home';
});

loadStatus();
</script>
<footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
