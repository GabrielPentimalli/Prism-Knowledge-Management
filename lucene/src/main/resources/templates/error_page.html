<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRISM | Errore</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header class="topbar">
    <div class="brand"><a href="/home">PRISM</a></div>
    <div class="local-mode-indicator" title="Modalità locale attiva"></div>
</header>
<main class="page" style="max-width: 720px;">
    <section class="panel">
        <div class="panel-header">
            <h1>Errore applicativo</h1>
        </div>
        <div class="panel-body">
            <p th:text="${error} ?: 'Si è verificato un errore inatteso.'"></p>
            <a class="cta" href="/home" style="margin-top: 12px;">Torna alla Home</a>
        </div>
    </section>
</main>
<footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
